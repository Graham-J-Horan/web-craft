<svg width="440" height="200" viewBox="0 0 440 200" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title" role="img">
  <title id="title">WebCraft Logo</title>

  <defs>
    <linearGradient id="mainGradient" x1="20%" y1="20%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background shape -->
  <rect 
    x="25" y="35" 
    width="390" height="130" 
    rx="32" 
    fill="#064e3b" 
    stroke="#059669" 
    stroke-width="12"/>

  <!-- The word "WebCraft" -->
  <text 
    x="220" 
    y="108" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="74" 
    font-weight="900" 
    letter-spacing="-3.5px" 
    fill="url(#mainGradient)" 
    text-anchor="middle" 
    dominant-baseline="middle"
    filter="url(#softGlow)">
    WebCraft
  </text>

  <!-- Thin highlight line under the text -->
  <line 
    x1="78" y1="138" 
    x2="362" y2="138" 
    stroke="#6ee7b7" 
    stroke-width="5" 
    stroke-linecap="round"/>
</svg>
